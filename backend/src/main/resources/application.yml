# Default 8080. If "Port 8080 was already in use", either stop the other process or run with another port, e.g. PowerShell:
#   $env:SERVER_PORT=8081; mvn spring-boot:run
# Then point the frontend at it: VITE_API_BASE_URL=http://localhost:8081
server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_csgts?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  upload:
    dir: ${APP_UPLOAD_DIR:${user.dir}/ai-csgts-uploads}
  # Optional OpenAI-compatible API (OpenAI, Azure OpenAI passthrough, Ollama with /v1, etc.).
  # When openai-api-key is non-blank and force-disabled is false, HR job-description NLP and employee AI insights call the model and fall back to heuristics on any error.
  ai:
    openai-base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    openai-api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    timeout-seconds: 60
    force-disabled: false
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000"
  jwt:
    issuer: "ai-csgts"
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32CHARS_MIN"
    # Short-lived when "Remember me" is off (browser session tab semantics).
    expiration-ms: 3600000
    # Used for login with "Remember me" — JWT lifetime (default 14 days).
    refresh-token-expiration-ms: 1209600000

